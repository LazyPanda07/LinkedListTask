name: "Continuous Integration"


on:
  push:
    branches: 
      - main
      - dev


jobs:
  build:
    strategy:
      matrix:
        config:
          - { os: windows-latest, upload-artifact-name: Windows }
          - { os: ubuntu-latest, upload-artifact-name: Linux }
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Enable CL
      if: ${{ matrix.config.os == 'windows-latest' }}
      uses: ilammy/msvc-dev-cmd@v1.13.0

    - name: Build
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=install-dir -G "Ninja" ..
        cmake --build . -j
        cmake --install .

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.config.upload-artifact-name }}
        path: build/bin/install-dir
